name: "My workflow"
on: 
  push:
    branches:
     - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
          distribution: 'corretto'
          java-version: '8'
    - name: java  check
      run: java -version
    - name: maven version checking 
      run: mvn --version
    - name: Build with Maven
      run: mvn package 
    - name: Deploy Tomcat 
      run: |
        curl -u "admin:admin" \
             --upload-file target/spring3-mvc-maven-xml-hello-world-1.14.war \
             "http://ec2-3-109-186-224.ap-south-1.compute.amazonaws.com:8080/manager/text/deploy?path=/github-springapp&update=true"

  
